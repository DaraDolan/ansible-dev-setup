---
- name: Include platform-specific variables
  include_vars: "{{ ansible_os_family }}.yml"

# Install Neovim repository and dependencies
- name: Install software-properties-common (for add-apt-repository)
  apt:
    name: software-properties-common
    state: present
  when: ansible_os_family == "Debian"
  become: true

- name: Remove Neovim unstable PPA (if present)
  apt_repository:
    repo: ppa:neovim-ppa/unstable
    state: absent
  when: ansible_os_family == "Debian"
  become: true
  ignore_errors: true

- name: Remove Neovim stable PPA (if present)
  apt_repository:
    repo: ppa:neovim-ppa/stable
    state: absent
  when: ansible_os_family == "Debian"
  become: true
  ignore_errors: true

- name: Remove apt-installed Neovim (we'll use Snap instead)
  apt:
    name: neovim
    state: absent
  when: ansible_os_family == "Debian"
  become: true

# Install Neovim via Snap (always gets latest stable)
- name: Install Neovim via Snap (stable version)
  snap:
    name: nvim
    classic: yes
    state: present
  when: ansible_os_family == "Debian"
  become: true

- name: Install Neovim and dependencies (macOS)
  homebrew:
    name: "{{ item }}"
    state: present
  with_items: "{{ neovim_packages }}"
  when: ansible_os_family == "Darwin"

- name: Create Python virtual environment for Neovim (using uv)
  shell: '{{ lookup("env", "HOME") }}/.local/bin/uv venv --python 3 "{{ lookup("env", "HOME") }}/.config/nvim/env"'
  args:
    creates: "{{ lookup('env', 'HOME') }}/.config/nvim/env/bin/python"
  become: false

- name: Install pynvim in the virtual environment (using uv)
  shell: '{{ lookup("env", "HOME") }}/.local/bin/uv pip install pynvim -p "{{ lookup("env", "HOME") }}/.config/nvim/env/bin/python"'
  args:
    creates: "{{ lookup('env', 'HOME') }}/.config/nvim/env/lib/python*/site-packages/pynvim"
  become: false


# Install Python and Node.js providers for Neovim

- name: Install Node.js provider for Neovim (via mise)
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
    npm install -g neovim
  args:
    executable: /bin/bash
  become: false
  changed_when: false

- name: Install luarocks (for Hererocks support)
  apt:
    name: luarocks
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install Perl provider dependencies
  apt:
    name:
      - perl
      - cpanminus
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install Perl Neovim provider
  command: cpanm -n Neovim::Ext
  become: true
  when: ansible_os_family == "Debian"

- name: Install Ruby and gem
  apt:
    name:
      - ruby
      - ruby-dev
    state: present
  become: true
  when: ansible_os_family == "Debian"


- name: Install FZF for Telescope
  apt:
    name: fzf
    state: present
  become: true
  when: ansible_os_family == "Debian"

# Create config directories
- name: Create base config directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.config"
    state: directory
    mode: 0755
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  become: false

- name: Create Neovim configuration directories
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/nvim/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  with_items:
    - ""
    - "lua"
    - "lua/core"
    - "lua/plugins"
    - "snippets"
  become: false

- name: Ensure lazy.nvim plugin manager is installed
  git:
    repo: 'https://github.com/folke/lazy.nvim.git'
    dest: "{{ lookup('env', 'HOME') }}/.local/share/nvim/lazy/lazy.nvim"
    version: stable
    clone: yes
    update: yes
  become: false

- name: Create Intelephense config directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/intelephense"
    state: directory
    mode: 0755
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  become: false

- name: Install Intelephense Premium license key
  copy:
    content: "00QWFAL4F6OR8QP"
    dest: "{{ lookup('env', 'HOME') }}/.config/intelephense/licence.txt"
    mode: 0600
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  become: false

# Copy configuration files
- name: Ensure init.lua file exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/nvim/lua/core/init.lua"
    state: touch
    mode: 0644
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  become: false

- name: Copy Neovim main configuration
  copy:
    src: "init.lua"
    dest: "{{ lookup('env', 'HOME') }}/.config/nvim/init.lua"
    force: yes
  become: false

- name: Copy Neovim core configuration files
  copy:
    src: "lua/core/{{ item }}"
    dest: "{{ lookup('env', 'HOME') }}/.config/nvim/lua/core/{{ item }}"
    force: yes
  with_items:
    - "init.lua"
    - "options.lua"
    - "keymaps.lua"
    - "autocmds.lua"
  become: false

- name: Copy Neovim plugin configuration files
  copy:
    src: "lua/plugins/{{ item }}"
    dest: "{{ lookup('env', 'HOME') }}/.config/nvim/lua/plugins/{{ item }}"
    force: yes
  with_items:
    - "init.lua"
  become: false

- name: Copy Neovim snippet files
  copy:
    src: "snippets/{{ item }}"
    dest: "{{ lookup('env', 'HOME') }}/.config/nvim/snippets/{{ item }}"
    force: yes
  with_items:
    - "php.json"
    - "markdown.json"
    - "javascript.json"
    - "typescript.json"
    - "typescriptreact.json"
    - "python.json"
  become: false

# Create data directories
- name: Create Neovim data directories
  file:
    path: "{{ lookup('env', 'HOME') }}/.local/share/nvim/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  with_items:
    - "site"
    - "undo"
  become: false

# Install Nerd Fonts
- name: Install Nerd Font (macOS)
  homebrew:
    name: font-hack-nerd-font
    state: present
    cask: yes
  when: ansible_os_family == "Darwin"

- name: Inform about manual font installation (Linux)
  debug:
    msg: "For the best experience, please install a Nerd Font manually: https://www.nerdfonts.com/font-downloads"
  when: ansible_os_family == "Debian"

# Install plugins and compile treesitter parsers
- name: Install plugins via lazy.nvim
  shell: nvim --headless "+Lazy sync" +qa
  become: false
  environment:
    CC: gcc
  timeout: 300

- name: Build Telescope FZF native extension
  shell: cd {{ lookup('env', 'HOME') }}/.local/share/nvim/lazy/telescope-fzf-native.nvim && make
  args:
    creates: "{{ lookup('env', 'HOME') }}/.local/share/nvim/lazy/telescope-fzf-native.nvim/build"
  register: fzf_build
  failed_when: false
  become: false
  when: ansible_os_family == "Debian"

- name: Compile treesitter parsers
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    nvim --headless -c "TSUpdate" -c "sleep 30" -c "qa"
  args:
    executable: /bin/bash
  become: false
  environment:
    CC: gcc
  timeout: 300

  # Fix nvim-lspconfig ts_ls bug (double-wrapped table issue)
- name: Fix ts_ls.lua root_dir bug in nvim-lspconfig
  replace:
    path: "{{ lookup('env', 'HOME') }}/.local/share/nvim/lazy/nvim-lspconfig/lsp/ts_ls.lua"
    regexp: 'local project_root = vim\.fs\.root\(bufnr, \{ project_root_markers \}\)'
    replace: 'local project_root = vim.fs.root(bufnr, project_root_markers)'
  become: false
  ignore_errors: yes

  # Verification
- name: Verify Neovim setup with healthcheck
  shell: nvim --headless -c "checkhealth" -c "q" > /tmp/nvim_health_check.log 2>&1
  changed_when: false
  register: health_check

- name: Display healthcheck results location
  debug:
    msg: "Neovim health check log available at /tmp/nvim_health_check.log"

- name: Configure Neovim to use pynvim from virtual environment
  blockinfile:
    path: "{{ lookup('env', 'HOME') }}/.config/nvim/lua/core/init.lua"
    block: |
      -- Set Python provider path
      vim.g.python3_host_prog = "{{ lookup('env', 'HOME') }}/.config/nvim/env/bin/python"
    insertafter: "-- Core configuration loader"
    marker: "-- {mark} ANSIBLE MANAGED BLOCK"
  become: false
  ignore_errors: true