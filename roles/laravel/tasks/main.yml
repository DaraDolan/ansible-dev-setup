---
- name: Get current username
  command: whoami
  register: username_result
  changed_when: false
  become: false

- name: Get user's home directory
  shell: 'echo $HOME'
  register: user_home
  changed_when: false
  become: false

# Install Composer globally
- name: Check if Composer is installed
  command: composer --version
  register: composer_check
  changed_when: false
  failed_when: false
  become: false

- name: Download Composer installer
  get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-setup.php
    mode: '0755'
  when: composer_check.rc != 0
  become: false

- name: Install Composer globally
  shell: php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
  when: composer_check.rc != 0
  become: true

- name: Remove Composer installer
  file:
    path: /tmp/composer-setup.php
    state: absent
  when: composer_check.rc != 0
  become: false

# Install global Composer packages for Laravel development
- name: Install Laravel Pint globally
  composer:
    command: require
    global_command: true
    arguments: laravel/pint
  become: false

- name: Install Laravel IDE Helper globally (optional)
  composer:
    command: require
    global_command: true
    arguments: barryvdh/laravel-ide-helper
  become: false
  ignore_errors: true

# Ensure Composer global bin is in PATH
- name: Add Composer global bin to PATH in zshrc
  lineinfile:
    path: "{{ user_home.stdout }}/.zshrc"
    line: 'export PATH="$HOME/.config/composer/vendor/bin:$PATH"'
    state: present
  become: false

- name: Add Composer global bin to PATH in bashrc
  lineinfile:
    path: "{{ user_home.stdout }}/.bashrc"
    line: 'export PATH="$HOME/.config/composer/vendor/bin:$PATH"'
    state: present
  become: false
  ignore_errors: true

- name: Create development directory structure
  file:
    path: "{{ user_home.stdout }}/development/projects"
    state: directory
    mode: 0755
  become: false

- name: Copy Laravel development aliases and functions
  copy:
    src: laravel-aliases.sh
    dest: "{{ user_home.stdout }}/.laravel-aliases.sh"
    mode: 0644
  become: false

- name: Add Laravel aliases to zshrc
  lineinfile:
    path: "{{ user_home.stdout }}/.zshrc"
    line: "# Laravel development aliases and functions"
    state: present
  become: false

- name: Source Laravel aliases in zshrc
  lineinfile:
    path: "{{ user_home.stdout }}/.zshrc"
    line: "source ~/.laravel-aliases.sh"
    state: present
    insertafter: "# Laravel development aliases and functions"
  become: false