---
- name: Include platform-specific variables
  include_vars: "{{ ansible_os_family }}.yml"

- name: Clean apt cache and update
  shell: |
    apt clean
    apt update
  when: ansible_os_family == "Debian"
  become: true

- name: Install packages (Ubuntu)
  apt:
    name: "{{ software_packages }}"
    state: present
    force_apt_get: yes
  when: ansible_os_family == "Debian"
  become: true

- name: Symlink fdfind to fd (Ubuntu's fd-find package installs as fdfind)
  file:
    src: /usr/bin/fdfind
    dest: "{{ lookup('env', 'HOME') }}/.local/bin/fd"
    state: link
    force: yes
  when: ansible_os_family == "Debian"

- name: Install PHP CLI (for Composer, Artisan, Pint)
  apt:
    name:
      - php-cli
      - unzip
    state: present
  when: ansible_os_family == "Debian"
  become: true

- name: Remove snap Node.js installation (migrating to mise)
  snap:
    name: node
    state: absent
  when: ansible_os_family == "Debian"
  become: true
  ignore_errors: true

- name: Install Homebrew packages (macOS)
  homebrew:
    name: "{{ software_packages }}"
    state: present
    update_homebrew: yes
  when: ansible_os_family == "Darwin"

- name: Fix duplicate repository entries
  shell: |
    rm -f /etc/apt/sources.list.d/ppa_neovim_ppa_unstable_jammy.list
  become: true
  when: ansible_os_family == "Debian"
  ignore_errors: true

- name: Install apt-utils
  apt:
    name: apt-utils
    state: present
    update_cache: yes
  become: true
  when: ansible_os_family == "Debian"
  ignore_errors: true

- name: Install libc-bin
  apt:
    name: libc-bin
    state: present
  become: true
  when: ansible_os_family == "Debian"
  ignore_errors: true

- name: Install locales
  apt:
    name: locales
    state: present
  become: true
  when: ansible_os_family == "Debian"
  ignore_errors: true

- name: Ensure en_US.UTF-8 locale is available
  lineinfile:
    path: /etc/locale.gen
    regexp: "^# en_US.UTF-8 UTF-8"
    line: "en_US.UTF-8 UTF-8"
    state: present
  become: true
  when: ansible_os_family == "Debian"
  register: locale_gen_file
  ignore_errors: true

- name: Generate locales
  command: locale-gen
  become: true
  when: ansible_os_family == "Debian" and locale_gen_file is success and locale_gen_file.changed
  ignore_errors: true

- name: Set environment variables for UTF-8 support
  blockinfile:
    path: /etc/profile.d/locale.sh
    create: yes
    block: |
      export LANG=en_US.UTF-8
      export LANGUAGE=en_US:en
      export LC_ALL=en_US.UTF-8
  become: true
  when: ansible_os_family == "Debian"
  ignore_errors: true

# Install Claude Code via native installer (enables auto-update)
- name: Install Claude Code
  shell: curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: "{{ lookup('env', 'HOME') }}/.local/bin/claude"
  become: false
  tags:
    - claude

- name: Clean up old Claude Code versions
  shell: |
    current=$(readlink {{ lookup('env', 'HOME') }}/.local/bin/claude | xargs basename)
    ls ~/.local/share/claude/versions/ | grep -v "^${current}$" | while read v; do
      rm -f ~/.local/share/claude/versions/$v
    done
  args:
    executable: /bin/bash
  become: false
  changed_when: false
  tags:
    - claude

# Create Claude configuration directory and disable telemetry

- name: Create Claude configuration directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.claude"
    state: directory
    mode: 0755
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  become: false
  tags:
    - claude

- name: Install Claude settings
  copy:
    src: "claude-settings.json"
    dest: "{{ lookup('env', 'HOME') }}/.claude/settings.json"
    force: yes
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
    mode: 0644
  become: false
  tags:
    - claude

- name: Create Claude commands directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.claude/commands"
    state: directory
    mode: 0775
  become: false
  tags:
    - claude

- name: Install Claude custom commands
  copy:
    src: "claude-commands/"
    dest: "{{ lookup('env', 'HOME') }}/.claude/commands/"
    mode: 0644
  become: false
  tags:
    - claude

- name: Create Claude global memory directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.claude/memory"
    state: directory
    mode: 0755
  become: false
  tags:
    - claude

- name: Install Claude global memory files
  copy:
    src: "claude-memory/"
    dest: "{{ lookup('env', 'HOME') }}/.claude/memory/"
    force: no
    mode: 0644
  become: false
  tags:
    - claude

# Install UV Python package manager
- name: Install UV Python package manager
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ lookup('env', 'HOME') }}/.local/bin/uv"
  become: false

- name: Add UV to PATH in shell profile
  lineinfile:
    path: "{{ lookup('env', 'HOME') }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
  become: false

- name: Add UV to PATH in zsh profile
  lineinfile:
    path: "{{ lookup('env', 'HOME') }}/.zshrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
    create: yes
  become: false
  ignore_errors: true

# Install mise for Node.js version management
- name: Install mise version manager
  shell: curl https://mise.run | sh
  args:
    creates: "{{ lookup('env', 'HOME') }}/.local/bin/mise"
  become: false

- name: Create mise config directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/mise"
    state: directory
    mode: 0755
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  become: false

- name: Configure mise for Node.js LTS
  copy:
    dest: "{{ lookup('env', 'HOME') }}/.config/mise/config.toml"
    content: |
      [tools]
      node = "lts"
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
    mode: 0644
  become: false

- name: Install Node.js LTS via mise
  shell: |
    export PATH="$HOME/.local/bin:$PATH"
    ~/.local/bin/mise install
  args:
    executable: /bin/bash
  become: false
  changed_when: false
  ignore_errors: true

# Yarn support (via Node's built-in Corepack, not a separate npm/mise install)
- name: Enable Corepack for Yarn support
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
    corepack enable
  args:
    executable: /bin/bash
  become: false
  register: corepack_enable
  changed_when: false
  failed_when: false
  tags:
    - yarn
    - corepack

- name: Warn if Corepack enable failed
  debug:
    msg: "Corepack enable failed (rc={{ corepack_enable.rc }}): {{ corepack_enable.stderr }}"
  when: corepack_enable.rc != 0
  tags:
    - yarn
    - corepack

- name: Activate Yarn via Corepack
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
    corepack prepare yarn@stable --activate
  args:
    executable: /bin/bash
  become: false
  when: corepack_enable.rc == 0
  register: yarn_activate
  changed_when: false
  failed_when: false
  tags:
    - yarn
    - corepack

- name: Warn if Yarn activation failed
  debug:
    msg: "Yarn activation via Corepack failed (rc={{ yarn_activate.rc }}): {{ yarn_activate.stderr }}"
  when: corepack_enable.rc == 0 and yarn_activate.rc != 0
  tags:
    - yarn
    - corepack

# Configure Git settings (configurable via variables)
- name: Set Git user name
  git_config:
    name: user.name
    scope: "{{ git_config_scope }}"
    value: "{{ git_user_name }}"
  become: false
  when: configure_git | default(true)

- name: Set Git user email
  git_config:
    name: user.email
    scope: "{{ git_config_scope }}"
    value: "{{ git_user_email }}"
  become: false
  when: configure_git | default(true)

- name: Set Git default branch
  git_config:
    name: init.defaultBranch
    scope: "{{ git_config_scope }}"
    value: "{{ git_default_branch }}"
  become: false
  when: configure_git | default(true)

- name: Set Git pull strategy
  git_config:
    name: pull.rebase
    scope: "{{ git_config_scope }}"
    value: "{{ git_pull_rebase | string | lower }}"
  become: false
  when: configure_git | default(true)

# Configure git aliases
- name: Configure git aliases
  git_config:
    name: alias.trim
    value: '!git diff --cached --name-only -z | xargs -0 sed -i "s/[[:space:]]*$//"'
    scope: global
  become: false
  when: configure_git | default(true)

# npm-based global tool installs (Prettier, Gemini CLI, tree-sitter-cli, Playwright)
# each tool below is independent: a failure in one must not skip the others.
- name: Check if npm is available via mise
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
    npm --version
  args:
    executable: /bin/bash
  become: false
  register: npm_check
  changed_when: false
  failed_when: false
  tags:
    - always

- name: Warn if npm is not available via mise
  debug:
    msg: "npm not available via mise (rc={{ npm_check.rc }}); skipping Prettier, Gemini CLI, tree-sitter-cli, and Playwright installs. stderr: {{ npm_check.stderr }}"
  when: npm_check.rc != 0
  tags:
    - always

- name: Install Prettier globally for code formatting via mise
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
    npm install -g prettier
  args:
    executable: /bin/bash
  become: false
  when: npm_check.rc == 0
  register: prettier_install
  changed_when: false
  failed_when: false
  tags:
    - prettier
    - formatting

- name: Warn if Prettier install failed
  debug:
    msg: "Prettier install failed (rc={{ prettier_install.rc }}): {{ prettier_install.stderr }}"
  when: npm_check.rc == 0 and prettier_install.rc != 0
  tags:
    - prettier
    - formatting

- name: Install Google Gemini CLI globally via mise
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
    npm install -g @google/gemini-cli
  args:
    executable: /bin/bash
  become: false
  when: npm_check.rc == 0
  register: gemini_cli_install
  changed_when: false
  failed_when: false
  tags:
    - gemini
    - ai-tools

- name: Warn if Gemini CLI install failed
  debug:
    msg: "Gemini CLI install failed (rc={{ gemini_cli_install.rc }}): {{ gemini_cli_install.stderr }}"
  when: npm_check.rc == 0 and gemini_cli_install.rc != 0
  tags:
    - gemini
    - ai-tools

- name: Install tree-sitter CLI for Neovim treesitter parser compilation
  shell: |
    export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
    npm install -g tree-sitter-cli
  args:
    executable: /bin/bash
  become: false
  when: npm_check.rc == 0
  register: tree_sitter_cli_install
  changed_when: false
  failed_when: false
  tags:
    - neovim
    - treesitter

- name: Warn if tree-sitter-cli install failed
  debug:
    msg: "tree-sitter-cli install failed (rc={{ tree_sitter_cli_install.rc }}): {{ tree_sitter_cli_install.stderr }}"
  when: npm_check.rc == 0 and tree_sitter_cli_install.rc != 0
  tags:
    - neovim
    - treesitter

# Install Playwright for web automation and MCP server support
- name: Install Playwright and its browser/system dependencies
  block:
    - name: Install Playwright test package globally via mise
      shell: |
        export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
        eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
        npm install -g @playwright/test
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install Playwright system dependencies
      shell: |
        export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
        eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
        npx playwright install-deps
      args:
        executable: /bin/bash
      become: true
      changed_when: "'Installing' in playwright_deps.stdout"
      register: playwright_deps

    - name: Install Chromium browser for Playwright
      shell: |
        export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
        eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
        npx playwright install chromium
      args:
        executable: /bin/bash
      changed_when: "'Downloading' in chrome_install.stdout"
      register: chrome_install

    - name: Verify Playwright installation
      shell: |
        export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
        eval "$({{ lookup('env', 'HOME') }}/.local/bin/mise activate bash)"
        npx playwright --version
      args:
        executable: /bin/bash
      register: playwright_version
      changed_when: false

  rescue:
    - name: Warn that Playwright installation failed
      debug:
        msg: "Playwright installation failed: {{ ansible_failed_result.msg | default('see task output above') }}"

  become: false
  when: npm_check.rc == 0 and (install_playwright | default(true))
  tags:
    - playwright
    - web-automation
    - testing

# Install GitHub CLI (gh) via first-party apt repository
- name: Get dpkg architecture for GitHub CLI repo
  command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false
  when: ansible_os_family == "Debian"
  tags:
    - github

- name: Ensure /etc/apt/keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - github

- name: Download GitHub CLI GPG key
  get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - github

- name: Add GitHub CLI apt repository
  apt_repository:
    repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    filename: github-cli
    state: present
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - github

- name: Install GitHub CLI
  apt:
    name: gh
    state: present
    update_cache: yes
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - github

- name: Remind user to authenticate with GitHub CLI
  debug:
    msg: "GitHub CLI installed. Run 'gh auth login' to authenticate with your GitHub account."
  tags:
    - github

# Install Terraform via HashiCorp's official apt repository
- name: Get dpkg architecture for HashiCorp repo
  command: dpkg --print-architecture
  register: dpkg_arch_hashicorp
  changed_when: false
  when: ansible_os_family == "Debian"
  tags:
    - terraform

- name: Ensure /etc/apt/keyrings directory exists (HashiCorp)
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - terraform

- name: Download and dearmor HashiCorp GPG key
  shell: curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /etc/apt/keyrings/hashicorp-archive-keyring.gpg
  args:
    creates: /etc/apt/keyrings/hashicorp-archive-keyring.gpg
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - terraform

- name: Add HashiCorp apt repository
  apt_repository:
    repo: "deb [arch={{ dpkg_arch_hashicorp.stdout }} signed-by=/etc/apt/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    filename: hashicorp
    state: present
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - terraform

- name: Install Terraform
  apt:
    name: terraform
    state: present
    update_cache: yes
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - terraform

- name: Install Terraform (macOS)
  homebrew:
    name: hashicorp/tap/terraform
    state: present
  when: ansible_os_family == "Darwin"
  tags:
    - terraform

# Install glow for rendering markdown files in the terminal
- name: Ensure /etc/apt/keyrings directory exists (Charm)
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - glow
    - markdown

- name: Download and dearmor Charm GPG key
  shell: curl -fsSL https://repo.charm.sh/apt/gpg.key | gpg --dearmor -o /etc/apt/keyrings/charm.gpg
  args:
    creates: /etc/apt/keyrings/charm.gpg
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - glow
    - markdown

- name: Add Charm apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *"
    filename: charm
    state: present
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - glow
    - markdown

- name: Install glow
  apt:
    name: glow
    state: present
    update_cache: yes
  become: true
  when: ansible_os_family == "Debian"
  tags:
    - glow
    - markdown

- name: Create zsh completions directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.zsh/completions"
    state: directory
    mode: '0755'
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
  become: false
  tags:
    - glow
    - markdown

- name: Generate glow zsh completion script
  shell: glow completion zsh > "{{ lookup('env', 'HOME') }}/.zsh/completions/_glow"
  args:
    executable: /bin/bash
    creates: "{{ lookup('env', 'HOME') }}/.zsh/completions/_glow"
  become: false
  tags:
    - glow
    - markdown

# Install win32yank for WSL2 system clipboard support (used by Neovim's unnamedplus clipboard)
- name: Check if running under WSL2
  set_fact:
    is_wsl2: "{{ 'microsoft' in ansible_kernel | lower }}"
  tags:
    - clipboard
    - neovim

- name: Ensure ~/.local/bin exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.local/bin"
    state: directory
    mode: '0755'
  when: is_wsl2
  tags:
    - clipboard
    - neovim

- name: Download win32yank
  get_url:
    url: https://github.com/equalsraf/win32yank/releases/download/v0.1.1/win32yank-x64.zip
    dest: /tmp/win32yank.zip
    mode: '0644'
  when: is_wsl2
  tags:
    - clipboard
    - neovim

- name: Extract win32yank.exe to ~/.local/bin
  unarchive:
    src: /tmp/win32yank.zip
    dest: "{{ lookup('env', 'HOME') }}/.local/bin"
    remote_src: yes
    include:
      - win32yank.exe
    mode: '0755'
  when: is_wsl2
  tags:
    - clipboard
    - neovim
